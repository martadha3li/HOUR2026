<!DOCTYPE html>
<html lang="ar" dir="rtl"><head><link rel="stylesheet" href="style.css"></head><body>
<div class="nav-bar">
    <a href="index.html">حجز جديد</a> <a href="daily.html">اليوم والغد</a>
    <a href="bookings.html">السجل الكامل</a> <a href="finance.html">المالية</a>
</div>
<div class="card"><table id="fullTable"><thead><tr><th>الاسم</th><th>التاريخ</th><th>الحالة</th></tr></thead><tbody id="fullBody"></tbody></table></div>
<script type="module">
    import { db } from './config.js';
    import { collection, getDocs } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";
    const s = await getDocs(collection(db, "bookings"));
    s.forEach(d => { 
        const b = d.data();
        let cls = b.status === 'checked_out' ? 'checked_out' : '';
        document.getElementById('fullBody').innerHTML += `<tr class="${cls}"><td>${b.customerInfo.name}</td><td>${b.bookingDate}</td><td>${b.status}</td></tr>`;
    });
</script></body></html>
