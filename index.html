<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام حجوزات الشاليهات والقاعات</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 20px; background-color: #f4f7f6; color: #333; }
        .container { max-width: 600px; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin: 0 auto; }
        h2, h3 { text-align: center; color: #2c3e50; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input, select { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background-color: #27ae60; color: white; border: none; border-radius: 4px; font-size: 16px; cursor: pointer; }
        button:hover { background-color: #219150; }
        .price-display { background: #e8f8f5; padding: 10px; border-left: 5px solid #2cc990; margin-top: 15px; font-weight: bold; text-align: center; }
    </style>
</head>
<body>

<div class="container">
    <h2>حجز شاليه / قاعة مناسبات</h2>
    <form id="bookingForm">
        <h3>بيانات العميل</h3>
        <div class="form-group">
            <label>اسم العميل:</label>
            <input type="text" id="custName" required placeholder="أدخل الاسم الكامل">
        </div>
        <div class="form-group">
            <label>رقم الجوال:</label>
            <input type="tel" id="custPhone" required placeholder="05xxxxxxxx">
        </div>

        <h3>تفاصيل الحجز</h3>
        <div class="form-group">
            <label>المرفق المطلوب:</label>
            <select id="facilityType" required>
                <option value="chalet_1">شاليه الفخامة (الأساسي: 1000 - الويكند: 1500)</option>
                <option value="hall_1">قاعة الرومانسية للمناسبات (الأساسي: 3000 - الويكند: 4500)</option>
            </select>
        </div>
        <div class="form-group">
            <label>تاريخ الحجز:</label>
            <input type="date" id="bookingDate" required>
        </div>
        <div class="form-group">
            <label>وقت الدخول (بداية الحجز):</label>
            <input type="time" id="startTime" required>
        </div>
        <div class="form-group">
            <label>وقت الخروج (نهاية الحجز):</label>
            <input type="time" id="endTime" required>
        </div>

        <button type="submit">التحقق وإتمام الحجز</button>
    </form>

    <div id="priceDisplay" class="price-display" style="display: none;"></div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";
    import { getFirestore, collection, addDoc, getDocs, query, where } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";

    // إعدادات Firebase الخاصة بك
    const firebaseConfig = {
        apiKey: "AIzaSyATSMFKx4jUo_Duw0FtD5HO_M69O7A55o0",
        authDomain: "fnews-7525e.firebaseapp.com",
        databaseURL: "https://fnews-7525e-default-rtdb.firebaseio.com",
        projectId: "fnews-7525e",
        storageBucket: "fnews-7525e.firebasestorage.app",
        messagingSenderId: "1023530532546",
        appId: "1:1023530532546:web:cbc1be1753237179bd455b"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // دالة لحساب السعر بناءً على اليوم (ويكند أو عادي) ومواسم معينة
    function calculatePrice(facilityId, dateStr) {
        const date = new Date(dateStr);
        const day = date.getDay(); // 5 = الجمعة, 6 = السبت
        
        // أسعار افتراضية للمثال
        let basePrice = facilityId === "chalet_1" ? 1000 : 3000;
        let weekendPrice = facilityId === "chalet_1" ? 1500 : 4500;

        // التحقق من الويكند (الجمعة والسبت)
        if (day === 5 || day === 6) {
            return { price: weekendPrice, type: "سعر نهاية الأسبوع (الويكند)" };
        }
        
        // هنا يمكنك إضافة شرط إضافي للتواريخ الموسمية (مثل الأعياد والإجازات الرسمية)
        return { price: basePrice, type: "سعر عادي وسط الأسبوع" };
    }

    // الاستماع لحدث إرسال النموذج
    document.getElementById('bookingForm').addEventListener('submit', async (e) => {
        e.preventDefault();

        const facilityId = document.getElementById('facilityType').value;
        const dateStr = document.getElementById('bookingDate').value;
        const startStr = document.getElementById('startTime').value;
        const endStr = document.getElementById('endTime').value;

        // تحويل الأوقات إلى دقائق ليسهل مقارنتها حسابياً واحتساب وقت التنظيف
        const [startH, startM] = startStr.split(':').map(Number);
        const [endH, endM] = endStr.split(':').map(Number);
        
        let reqStart = startH * 60 + startM;
        let reqEnd = endH * 60 + endM;

        // إذا كان الحجز ينتهي في اليوم التالي (بعد منتصف الليل)
        if (reqEnd <= reqStart) {
            reqEnd += 24 * 60; 
        }

        const bufferMinutes = 60; // ساعة كاملة فاصلة للتنظيف المحددة من قبلك

        // وقت الحجز المطلوب الفعلي مضافاً إليه ساعة التنظيف بعده لضمان عدم التداخل
        const reqEndWithBuffer = reqEnd + bufferMinutes;

        try {
            // جلب الحجوزات القائمة لنفس المرفق ونفس التاريخ للتحقق من التداخل
            const q = query(collection(db, "bookings"), 
                where("facilityId", "==", facilityId),
                where("bookingDate", "==", dateStr),
                where("status", "==", "confirmed")
            );

            const querySnapshot = await getDocs(q);
            let isOverlapping = false;

            querySnapshot.forEach((doc) => {
                const existing = doc.data();
                const [eStartH, eStartM] = existing.startTime.split(':').map(Number);
                const [eEndH, eEndM] = existing.endTime.split(':').map(Number);
                
                let existStart = eStartH * 60 + eStartM;
                let existEnd = eEndH * 60 + eEndM;
                if (existEnd <= existStart) existEnd += 24 * 60;

                // إضافة وقت التنظيف للحجز القديم أيضاً للتأكد من المسافة الآمنة
                let existEndWithBuffer = existEnd + existing.cleaningBufferMinutes;

                // معادلة التحقق الرياضية للتداخل: 
                // (بداية الحجز الجديد تقع خلال الحجز القديم وفترة تنظيفه) أَوْ (نهاية الحجز الجديد مع تنظيفه تداخلت مع بداية القديم)
                if ((reqStart >= existStart && reqStart < existEndWithBuffer) || 
                    (reqEndWithBuffer > existStart && reqStart < existEnd)) {
                    isOverlapping = true;
                }
            });

            if (isOverlapping) {
                alert("عذراً، هذا الوقت متداخل مع حجز آخر أو يقع ضمن الساعة المخصصة للتنظيف. يرجى اختيار وقت آخر.");
                return;
            }

            // حساب السعر تلقائياً بناءً على التاريخ والمرفق
            const priceDetails = calculatePrice(facilityId, dateStr);

            // إدخال الحجز بنجاح إذا اجتاز التحقق
            const docRef = await addDoc(collection(db, "bookings"), {
                customerInfo: {
                    name: document.getElementById('custName').value,
                    phone: document.getElementById('custPhone').value
                },
                facilityId: facilityId,
                bookingDate: dateStr,
                startTime: startStr,
                endTime: endStr,
                cleaningBufferMinutes: bufferMinutes,
                pricingType: priceDetails.type,
                totalPrice: priceDetails.price,
                status: "confirmed",
                createdAt: new Date()
            });

            // عرض تفاصيل السعر والنجاح للمستخدم
            const displayDiv = document.getElementById('priceDisplay');
            displayDiv.style.display = 'block';
            displayDiv.innerHTML = `تم الحجز بنجاح!<br>نوع السعر: ${priceDetails.type}<br>الإجمالي: ${priceDetails.price} ريال سعودي.`;
            
            document.getElementById('bookingForm').reset();

        } catch (error) {
            console.error("خطأ في معالجة الحجز: ", error);
            alert("حدث خطأ أثناء الاتصال بقاعدة البيانات.");
        }
    });
</script>

</body>
</html>
