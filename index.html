<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>تسجيل حجز جديد</title>
    <style>
        body { font-family: sans-serif; background: #f4f4f4; padding: 10px; }
        .nav-bar { background: #333; padding: 10px; display: flex; gap: 15px; border-radius: 5px; margin-bottom: 20px; }
        .nav-bar a { color: white; text-decoration: none; }
        .card { background: white; padding: 20px; border-radius: 8px; max-width: 500px; margin: auto; }
    </style>
</head>
<body>

<div class="nav-bar">
    <a href="index.html">تسجيل حجز جديد</a>
    <a href="daily.html">اليوم والغد</a>
    <a href="bookings.html">السجل الكامل</a>
    <a href="finance.html">المالية</a>
    <a href="admin.html">الإدارة</a>
</div>

<div id="loginSection" class="card">
    <h3>تسجيل دخول الموظف</h3>
    <input type="text" id="empName" placeholder="اكتب اسمك للمتابعة">
    <button onclick="saveLogin()">دخول</button>
</div>

<div id="bookingSection" class="card" style="display:none;">
    <h2>حجز جديد</h2>
    <form id="bookingForm">
        <input type="text" id="custName" placeholder="اسم العميل" required>
        <input type="tel" id="custPhone" placeholder="رقم الجوال" required>
        <select id="facSelect"></select>
        <input type="date" id="bDate" required>
        <button type="submit">تأكيد الحجز</button>
    </form>
</div>

<script type="module">
    import { db } from './config.js';
    import { addDoc, collection } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";

    // منطق الدخول البسيط
    window.saveLogin = () => {
        const name = document.getElementById('empName').value;
        if(name) {
            localStorage.setItem('employeeName', name);
            showBookingForm();
        }
    }

    function showBookingForm() {
        document.getElementById('loginSection').style.display = 'none';
        document.getElementById('bookingSection').style.display = 'block';
    }

    // التحقق عند فتح الصفحة
    if(localStorage.getItem('employeeName')) showBookingForm();
</script>
</body>
</html>
