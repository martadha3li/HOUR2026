<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>إدارة المرافق</title>
    <style>body{font-family:sans-serif; padding:20px; background:#f4f4f4;} .card{background:#fff; padding:15px; border-radius:8px; margin-bottom:10px;}</style>
</head>
<body>
    <div class="card">
        <h2>إضافة مرافق جديدة</h2>
        <form id="facForm">
            <input type="text" id="facName" placeholder="اسم المرفق" required><br>
            <input type="number" id="basePrice" placeholder="السعر العادي" required><br>
            <input type="number" id="weekendPrice" placeholder="سعر الويكند" required><br>
            <input type="number" id="seasonExtra" placeholder="زيادة الموسم" required><br>
            <button type="submit">حفظ المرفق</button>
        </form>
    </div>
    <div id="facList"></div>

    <script type="module">
        import { db } from './config.js'; // استدعاء الإعدادات المشتركة
        import { collection, addDoc, getDocs } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";

        document.getElementById('facForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            await addDoc(collection(db, "facilities"), {
                name: document.getElementById('facName').value,
                basePrice: Number(document.getElementById('basePrice').value),
                weekendPrice: Number(document.getElementById('weekendPrice').value),
                seasonExtra: Number(document.getElementById('seasonExtra').value)
            });
            alert("تم الحفظ!");
            location.reload();
        });

        // جلب وعرض المرافق...
    </script>
</body>
</html>
